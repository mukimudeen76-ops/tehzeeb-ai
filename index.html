<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tehzeeb AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F7F6F3; --bg-2:#FFFFFF; --surface:#FFFFFF; --surface-2:#F0EFEB;
    --line:#11131A1f; --line-solid:#1A1C22;
    --cyan:#0E8C7A; --violet:#5B4FC4; --amber:#B5650A;
    --text:#0E0F12; --text-dim:#5C6070;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  button{ touch-action:manipulation; }
  html,body{ height:100%; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; }
  body{
    display:flex; flex-direction:column; height:100vh; height:100dvh; overflow:hidden; position:relative;
    background:
      radial-gradient(1100px 550px at 50% -10%, #0E0F1208 0%, transparent 60%),
      radial-gradient(800px 500px at 90% 8%, #5B4FC410 0%, transparent 55%),
      var(--bg);
  }
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; opacity:0.6;
    background-image: radial-gradient(rgba(14,15,18,0.05) 1px, transparent 1px);
    background-size: 26px 26px;
  }

  header{ display:flex; align-items:center; justify-content:space-between; padding:14px 20px;
    background:rgba(255,255,255,0.8); backdrop-filter: blur(14px); border-bottom:1px solid var(--line);
    flex-shrink:0; position:relative; z-index:5; }
  .icon-btn{ background:var(--surface); border:1px solid var(--line-solid); color:var(--text);
    width:38px; height:38px; border-radius:50%; cursor:pointer;
    display:flex; align-items:center; justify-content:center; transition:all .2s ease; }
  .icon-btn:hover{ border-color:var(--cyan); box-shadow:0 0 14px rgba(94,234,212,0.25); }
  .icon-btn svg{ width:18px; height:18px; }
  .header-right{ display:flex; gap:8px; align-items:center; }

  .brand{ display:flex; align-items:center; gap:10px; cursor:pointer; }
  .brand-orb{ width:26px; height:26px; border-radius:50%; position:relative; flex-shrink:0;
    background: conic-gradient(from 180deg, var(--cyan), var(--violet), var(--amber), var(--cyan));
    filter: drop-shadow(0 0 8px rgba(94,234,212,0.5)); animation: spin 4s linear infinite; }
  .brand-orb::after{ content:""; position:absolute; inset:3px; border-radius:50%; background:var(--bg-2); }
  @keyframes spin{ to{ transform:rotate(360deg);} }
  .brand h1{ font-family:'Space Grotesk', sans-serif; font-size:17px; font-weight:700; letter-spacing:-0.01em; }
  .owner-badge{ font-size:10px; color:var(--amber); font-family:'JetBrains Mono',monospace; letter-spacing:0.04em; display:none; align-items:center; gap:3px; }
  .owner-badge.show{ display:flex; }

  /* Drawer */
  .drawer-overlay{ position:fixed; inset:0; background:rgba(4,5,8,0.55); backdrop-filter:blur(3px); opacity:0; pointer-events:none; transition:opacity .25s; z-index:30; }
  .drawer-overlay.open{ opacity:1; pointer-events:auto; }
  .drawer{ position:fixed; top:0; left:0; height:100vh; height:100dvh; width:84%; max-width:300px;
    background:var(--bg-2); border-right:1px solid var(--line-solid); z-index:31;
    transform:translateX(-105%); transition:transform .32s cubic-bezier(.16,1,.3,1);
    padding:18px 16px; display:flex; flex-direction:column; gap:4px; overflow-y:auto; }
  .drawer.open{ transform:translateX(0); }
  .drawer h3{ font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:500; margin-bottom:8px; margin-top:14px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.12em; }
  .drawer h3:first-child{ margin-top:0; }
  .new-chat-btn{ width:100%; display:flex; align-items:center; justify-content:center; gap:8px; background:linear-gradient(135deg,var(--cyan),var(--violet));
    color:#06070A; border:none; border-radius:10px; padding:10px; font-weight:700; font-size:12.5px; cursor:pointer; margin-bottom:4px; }
  .chat-list{ display:flex; flex-direction:column; gap:3px; max-height:200px; overflow-y:auto; }
  .chat-item{ display:flex; align-items:center; gap:8px; padding:9px 10px; border-radius:9px; cursor:pointer; font-size:12.5px; color:var(--text-dim); transition:all .15s; }
  .chat-item:hover{ background:var(--surface); color:var(--text); }
  .chat-item.active{ background:var(--surface-2); color:var(--text); border:1px solid var(--line-solid); }
  .chat-item-title{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .chat-del{ background:none; border:none; color:var(--text-dim); cursor:pointer; opacity:0; }
  .chat-item:hover .chat-del{ opacity:1; }
  .chat-del:hover{ color:#ff6b6b; }
  .drawer-item{ display:flex; align-items:center; gap:10px; background:none; border:1px solid transparent; text-align:left;
    padding:10px 11px; border-radius:10px; font-size:13px; font-weight:500; color:var(--text); cursor:pointer; transition:all .2s ease; width:100%; }
  .drawer-item:hover{ background:var(--surface); border-color:var(--line-solid); }
  .drawer-note{ margin-top:auto; font-size:11px; color:var(--text-dim); line-height:1.6; padding:12px; background:var(--surface); border-radius:12px; border:1px solid var(--line-solid); }

  .brain-box{ background:var(--surface); border:1px solid var(--line-solid); border-radius:12px; padding:12px; display:flex; flex-direction:column; gap:8px; }
  .brain-box label{ font-size:10.5px; color:var(--text-dim); font-family:'JetBrains Mono',monospace; letter-spacing:0.04em; }
  .brain-box select, .brain-box input{
    background:var(--surface-2); border:1px solid var(--line-solid); color:var(--text); border-radius:8px;
    padding:9px 10px; font-size:12.5px; font-family:'JetBrains Mono',monospace; outline:none; width:100%;
  }
  .brain-box select:focus, .brain-box input:focus{ border-color:var(--cyan); }
  .voice-options{ display:flex; gap:6px; }
  .voice-chip{ flex:1; background:var(--surface-2); border:1px solid var(--line-solid); color:var(--text-dim); border-radius:8px;
    padding:8px 4px; font-size:11px; cursor:pointer; text-align:center; transition:all .15s; }
  .voice-chip.active{ border-color:var(--cyan); color:var(--cyan); background:rgba(94,234,212,0.08); }

  .owner-box{ background:var(--surface); border:1px solid var(--line-solid); border-radius:12px; padding:12px; display:flex; flex-direction:column; gap:8px; }
  .owner-box input{ background:var(--surface-2); border:1px solid var(--line-solid); color:var(--text); border-radius:8px; padding:9px 10px; font-size:13px; outline:none; width:100%; font-family:'JetBrains Mono',monospace; }
  .owner-box input:focus{ border-color:var(--amber); }
  .owner-box button{ background:linear-gradient(135deg, var(--amber), #ff8b6b); color:#1a0e00; border:none; border-radius:8px; padding:9px; font-size:12px; font-weight:700; cursor:pointer; }
  .owner-status{ font-size:11px; color:var(--text-dim); }
  .owner-status.active{ color:var(--amber); }

  /* Live banner */
  .live-banner{ display:none; align-items:center; justify-content:center; gap:8px; padding:9px;
    background:linear-gradient(90deg, transparent, rgba(94,234,212,0.1), transparent);
    border-bottom:1px solid var(--line); font-size:11.5px; font-weight:500; color:var(--cyan); flex-shrink:0;
    font-family:'JetBrains Mono',monospace; letter-spacing:0.04em; cursor:pointer; }
  .live-banner.show{ display:flex; }
  .live-dot{ width:7px; height:7px; border-radius:50%; background:var(--cyan); box-shadow:0 0 8px var(--cyan); animation:pulseDot 1.4s infinite; }
  @keyframes pulseDot{ 0%,100%{opacity:1;} 50%{opacity:.3;} }

  /* Avatar zone */
  .avatar-zone{ height:160px; flex-shrink:0; position:relative; border-bottom:1px solid var(--line); }
  #avatarCanvas{ width:100%; height:100%; display:block; }
  .avatar-status{ position:absolute; bottom:8px; left:50%; transform:translateX(-50%); }
  .status-pill{ display:flex; align-items:center; gap:5px; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.04em;
    padding:4px 11px; border-radius:20px; background:rgba(255,255,255,.85); border:1px solid var(--line-solid); backdrop-filter:blur(6px); box-shadow:0 2px 10px rgba(14,15,18,0.06); }
  .status-dot{ width:6px; height:6px; border-radius:50%; }

  #chat{ flex:1; overflow-y:auto; padding:22px 18px; display:flex; flex-direction:column; gap:18px; position:relative; z-index:2; }
  #chat::-webkit-scrollbar{ width:5px; }
  #chat::-webkit-scrollbar-thumb{ background:var(--line-solid); border-radius:10px; }

  .row{ display:flex; flex-direction:column; max-width:84%; animation:fadeIn .3s ease; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }
  .row.user{ align-self:flex-end; align-items:flex-end; }
  .row.bot{ align-self:flex-start; align-items:flex-start; }
  .tag{ font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-dim); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:6px; padding:0 4px; }
  .row.bot .tag{ color:var(--cyan); font-weight:600; }
  .bubble{ padding:13px 17px; border-radius:14px; font-size:14.5px; line-height:1.6; white-space:pre-wrap; word-wrap:break-word; }
  .row.user .bubble{ background:var(--surface-2); color:var(--text); border:1px solid var(--line-solid); border-top-right-radius:4px; }
  .row.bot .bubble{ background:linear-gradient(180deg, var(--surface), var(--bg-2)); border:1px solid var(--line); border-top-left-radius:4px; box-shadow: 0 0 24px rgba(94,234,212,0.04); }

  .codeblock{ background:#0a0c10; border:1px solid var(--line-solid); border-radius:10px; margin:8px 0; overflow:hidden; }
  .codeblock-head{ display:flex; align-items:center; justify-content:space-between; padding:7px 12px; background:var(--surface-2); border-bottom:1px solid var(--line-solid); }
  .codeblock-lang{ font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--text-dim); text-transform:uppercase; }
  .codeblock-actions{ display:flex; gap:6px; }
  .codeblock-actions button{ display:flex; align-items:center; gap:4px; background:none; border:1px solid var(--line-solid); color:var(--text-dim);
    font-size:10.5px; padding:4px 8px; border-radius:6px; cursor:pointer; }
  .codeblock-actions button:hover{ border-color:var(--cyan); color:var(--cyan); }
  .codeblock pre{ margin:0; padding:12px 14px; overflow-x:auto; }
  .codeblock code{ font-family:'JetBrains Mono',monospace; font-size:12.5px; line-height:1.6; color:#d4d8e2; white-space:pre; }
  .inline-code{ background:var(--surface-2); border:1px solid var(--line-solid); padding:1px 5px; border-radius:5px; font-family:'JetBrains Mono',monospace; font-size:12.5px; color:var(--amber); }

  .typing-dots{ display:flex; gap:4px; padding:4px 2px; }
  .typing-dots span{ width:6px; height:6px; border-radius:50%; background:var(--cyan); animation: tdot 1.2s infinite ease-in-out; }
  .typing-dots span:nth-child(2){ animation-delay:.15s; }
  .typing-dots span:nth-child(3){ animation-delay:.3s; }
  @keyframes tdot{ 0%,80%,100%{ opacity:.25; transform:scale(0.8); } 40%{ opacity:1; transform:scale(1.1); } }

  .empty{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:10px; padding:30px 20px; }
  .empty h2{ font-family:'Space Grotesk', sans-serif; font-size:25px; font-weight:700; letter-spacing:-0.01em; background:linear-gradient(135deg, var(--text) 30%, var(--cyan) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .empty p{ font-size:14px; max-width:300px; color:var(--text-dim); }
  .suggest-row{ display:flex; flex-wrap:wrap; gap:7px; justify-content:center; margin-top:6px; max-width:330px; }
  .suggest-chip{ background:var(--surface); border:1px solid var(--line-solid); color:var(--text-dim); font-size:11.5px; padding:7px 13px; border-radius:16px; cursor:pointer; }
  .suggest-chip:hover{ border-color:var(--cyan); color:var(--text); }

  footer{ padding:12px 16px 18px; background:rgba(255,255,255,0.78); backdrop-filter:blur(14px); border-top:1px solid var(--line); flex-shrink:0; position:relative; z-index:5; }
  .pending-attach{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; }
  .pending-chip{ display:flex; align-items:center; gap:5px; background:var(--surface); border:1px solid var(--line-solid); border-radius:14px; padding:4px 8px; font-size:11px; }
  .pending-chip img{ width:18px; height:18px; object-fit:cover; border-radius:4px; }
  .pending-chip button{ background:none; border:none; color:var(--text-dim); cursor:pointer; }

  .input-row{ display:flex; align-items:flex-end; gap:10px; background:var(--surface); border:1px solid var(--line-solid); border-radius:24px; padding:7px 7px 7px 18px; transition:all .2s ease; }
  .input-row:focus-within{ border-color:var(--cyan); box-shadow:0 0 0 3px rgba(94,234,212,0.08); }
  #mic, #attachBtn, #screenBtn{ background:var(--surface-2); border:1px solid var(--line-solid); color:var(--text-dim); width:38px; height:38px; border-radius:50%; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all .2s ease; }
  #mic:hover, #attachBtn:hover, #screenBtn:hover{ border-color:var(--cyan); color:var(--cyan); }
  #mic.listening{ background:#3a1212; border-color:#ff6b6b; color:#ff6b6b; animation:micpulse 1s infinite; }
  #screenBtn.active{ background:#123a2a; border-color:var(--cyan); color:var(--cyan); }
  @keyframes micpulse{ 0%,100%{box-shadow:0 0 0 0 rgba(255,107,107,.4);} 50%{box-shadow:0 0 0 6px rgba(255,107,107,0);} }
  #send{ background:linear-gradient(135deg, var(--cyan), var(--violet)); border:none; color:#06070A; font-weight:700; font-size:12.5px; letter-spacing:0.03em; padding:11px 20px; border-radius:20px; cursor:pointer; transition:all .2s ease; flex-shrink:0; }
  #send:hover{ filter:brightness(1.08); transform:translateY(-1px); }
  #send:disabled{ opacity:0.5; cursor:not-allowed; transform:none; }
  textarea{ flex:1; background:none; border:none; outline:none; resize:none; color:var(--text); font-family:'Inter',sans-serif; font-size:14.5px; line-height:1.5; max-height:120px; padding:9px 0; }
  textarea::placeholder{ color:var(--text-dim); }
  .hint{ margin-top:9px; font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--text-dim); text-align:center; letter-spacing:0.02em; opacity:0.7; }

  .attach-wrap{ position:relative; }
  .attach-popover{ position:absolute; bottom:50px; left:0; background:var(--surface); border:1px solid var(--line-solid); border-radius:12px; padding:7px; display:none; flex-direction:column; min-width:185px; z-index:25; }
  .attach-popover.open{ display:flex; }
  .attach-popover button{ display:flex; align-items:center; gap:8px; background:none; border:none; color:var(--text); text-align:left; padding:9px 10px; border-radius:8px; font-size:13px; cursor:pointer; }
  .attach-popover button:hover{ background:var(--surface-2); }

  /* Code editor overlay — intentionally kept dark/terminal-style for contrast,
     self-contained colors so it stays correct regardless of the app's theme */
  .editor-overlay{ position:fixed; inset:0; background:rgba(4,5,8,.7); backdrop-filter:blur(4px); z-index:50; display:none; align-items:center; justify-content:center; padding:18px; }
  .editor-overlay.open{ display:flex; }
  .editor-panel{ width:100%; height:100%; max-width:760px; max-height:680px; background:#14161C; border:1px solid #2A2D36; border-radius:16px; display:flex; flex-direction:column; overflow:hidden; }
  .editor-head{ display:flex; align-items:center; justify-content:space-between; padding:11px 14px; border-bottom:1px solid #2A2D36; background:#1A1C22; flex-shrink:0; }
  .editor-tabs{ display:flex; gap:4px; }
  .editor-tab{ background:none; border:1px solid #2A2D36; color:#8A90A0; font-family:'JetBrains Mono',monospace; font-size:11px; padding:6px 13px; border-radius:7px; cursor:pointer; }
  .editor-tab.active{ background:#21242C; color:var(--cyan); border-color:var(--cyan); }
  .editor-close{ background:none; border:none; color:#8A90A0; cursor:pointer; }
  .editor-body{ flex:1; display:flex; flex-direction:column; overflow:hidden; }
  .editor-code-col{ flex:1.3; display:flex; flex-direction:column; min-height:0; border-bottom:1px solid #2A2D36; }
  .editor-textarea{ flex:1; background:#0a0c10; border:none; outline:none; color:#d4d8e2; font-family:'JetBrains Mono',monospace; font-size:13px; line-height:1.6; padding:16px; resize:none; }
  .editor-run-row{ display:flex; align-items:center; gap:10px; padding:9px 14px; background:#1A1C22; border-top:1px solid #2A2D36; }
  .editor-run-btn{ display:flex; align-items:center; gap:6px; background:linear-gradient(135deg,var(--cyan),var(--violet)); border:none; color:#06070A; font-weight:700; font-size:12px; padding:8px 16px; border-radius:8px; cursor:pointer; }
  .editor-output-col{ flex:1; display:flex; flex-direction:column; min-height:0; }
  .editor-output-label{ font-family:'JetBrains Mono',monospace; font-size:10px; color:#8A90A0; letter-spacing:.08em; padding:9px 14px 5px; flex-shrink:0; }
  .editor-console{ flex:1; overflow-y:auto; padding:0 14px 14px; font-family:'JetBrains Mono',monospace; font-size:12.5px; }
  .editor-output-empty{ color:#8A90A0; font-size:12.5px; padding:8px 14px; }
  .console-line{ padding:3px 0; border-bottom:1px solid #23283470; color:#d4d8e2; white-space:pre-wrap; word-break:break-word; }
  .console-line.error{ color:#ff8b8b; }
  .console-line.warn{ color:var(--amber); }
  .editor-html-frame{ flex:1; width:100%; border:none; background:#fff; }


  /* PIN modal */
  .pin-overlay{ position:fixed; inset:0; background:rgba(4,5,8,.7); backdrop-filter:blur(4px); z-index:60; display:none; align-items:center; justify-content:center; padding:20px; }
  .pin-overlay.open{ display:flex; }
  .pin-modal{ background:var(--bg-2); border:1px solid var(--amber); border-radius:16px; padding:24px; max-width:300px; width:100%; text-align:center; box-shadow:0 0 40px rgba(255,177,105,0.15); }
  .pin-modal h3{ font-family:'Space Grotesk',sans-serif; font-size:17px; margin-bottom:6px; color:var(--amber); }
  .pin-modal p{ font-size:12px; color:var(--text-dim); margin-bottom:14px; }
  .pin-modal input{ width:100%; background:var(--surface-2); border:1px solid var(--line-solid); color:var(--text); padding:11px; border-radius:9px; text-align:center; font-family:'JetBrains Mono',monospace; font-size:14px; outline:none; margin-bottom:10px; }
  .pin-modal input:focus{ border-color:var(--amber); }
  .pin-modal-actions{ display:flex; gap:8px; }
  .pin-modal-actions button{ flex:1; border:none; border-radius:9px; padding:10px; font-size:12.5px; font-weight:700; cursor:pointer; }
  #pinConfirm{ background:linear-gradient(135deg,var(--amber),#ff8b6b); color:#1a0e00; }
  #pinCancel{ background:var(--surface-2); color:var(--text-dim); border:1px solid var(--line-solid) !important; }
  .pin-error{ color:#ff6b6b; font-size:11px; margin-top:6px; display:none; }
  .pin-error.show{ display:block; }
</style>
</head>
<body>

<div class="drawer-overlay" id="drawerOverlay"></div>
<div class="drawer" id="drawer">
  <h3>Baatcheet</h3>
  <button class="new-chat-btn" id="newChatBtn" type="button">+ &nbsp;Nayi Baatcheet</button>
  <div class="chat-list" id="chatList"></div>

  <h3>Awaaz</h3>
  <div class="brain-box">
    <label>VOICE CHUNO</label>
    <div class="voice-options" id="voiceOptions">
      <div class="voice-chip" data-voice="female1">Ladki 1</div>
      <div class="voice-chip" data-voice="female2">Ladki 2</div>
      <div class="voice-chip" data-voice="male1">Ladka</div>
    </div>
  </div>

  <h3>Model</h3>
  <div class="brain-box">
    <label>DIMAG</label>
    <select id="modelSelect">
      <option value="claude-sonnet-4-6">claude-sonnet-4-6</option>
      <option value="claude-haiku-4-5-20251001">claude-haiku-4-5-20251001</option>
      <option value="claude-opus-4-6">claude
